<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Auditoria de Estoque</h2>
    <button (click)="carregar()" class="btn btn-outline-secondary btn-sm">
      Atualizar
    </button>
  </div>

  <div *ngIf="carregando" class="text-center py-5 text-muted">Carregando...</div>
  <div *ngIf="erro" class="alert alert-danger">{{ erro }}</div>

  <table *ngIf="!carregando && !erro" class="table table-bordered">
    <thead class="table-light">
      <tr>
        <th>Produto</th>
        <th>Saldo Atual</th>
        <th>Extrato</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let a of auditorias">

        <tr>
          <td>{{ a.nomeProduto }}</td>
          <td><span class="badge bg-primary">{{ a.saldoAtual }}</span></td>
          <td>
            <button (click)="toggleExtrato(a.produtoId)"
                    class="btn btn-sm btn-outline-secondary">
              {{ produtoExpandido === a.produtoId ? 'Fechar' : 'Ver extrato' }}
            </button>
          </td>
        </tr>

        <tr *ngIf="produtoExpandido === a.produtoId">
          <td colspan="3" class="bg-light">
            <small class="text-muted d-block mb-2">Movimentações:</small>
            <div *ngFor="let linha of a.movimentacoes" class="small mb-1">
              {{ linha }}
            </div>
            <div *ngIf="a.movimentacoes.length === 0" class="text-muted small">
              Nenhuma movimentação registrada.
            </div>
          </td>
        </tr>

      </ng-container>
    </tbody>
  </table>

</div>
