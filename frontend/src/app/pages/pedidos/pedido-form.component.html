<div class="container mt-4 mx-auto" style="max-width: 700px;">

  <h4 class="mb-4">Novo Pedido</h4>


  <div class="border rounded p-3 mb-4 bg-light">
    <h6 class="mb-4">Adicionar item</h6>
    

    <div class="mb-2">
      <label class="form-label">Produto</label>
      <select [(ngModel)]="produtoSelecionado" class="form-select">
        <option [ngValue]="null">Selecione um produto</option>
        <option *ngFor="let p of produtos" [ngValue]="p">
          {{p.nome}} - Disponivel: {{ p.estoque - p.estoqueMin }}
        </option>
      </select>
    </div>

    <div class="mb-2">
      <label class="form-label">Quantidade</label>
      <input [(ngModel)]="quantidadeSelecionada" type="number" min="1" class="form-control">
    </div>
    
    <button (click)="adicionarItem()" class="btn btn-outline-primary btn-sm mt-1">
      + Adicionar
    </button>
  </div>

  <table *ngIf="itens.length > 0" class="table table-sm table-bordered mb-4">
    <thead class="table-light">
      <tr>
        <th>Produto</th>
        <th>Qtd</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of itens; let i = index">
        <td>{{ getNomeProduto(item.produtoId) }}</td>
        <td>{{ item.quantidade }}</td>
        <td>
          <button (click)="removerItem(i)" class="btn btn-sm btn-outline-danger">
            Remover
          </button>
        </td>
      </tr>
    </tbody>
  </table>


  <div *ngIf="erro" class="alert alert-danger">{{ erro }}</div>
  <div *ngIf="sucesso" class="alert alert-success">Pedido criado com sucesso!</div>

  <div class="d-flex gap-2">
    <button (click)="salvar()" [disabled]="itens.length === 0" class="btn btn-primary flex-fill">
      Confirmar Pedido
    </button>
    <button (click)="voltar()" class="btn btn-secondary flex-fill">
      Cancelar
    </button>
  </div>

</div>
